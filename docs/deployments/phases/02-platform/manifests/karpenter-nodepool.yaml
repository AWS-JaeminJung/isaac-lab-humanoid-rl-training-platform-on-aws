################################################################################
# Karpenter NodePools: GPU Burst (Spot + On-Demand fallback)
#
# Two NodePools for burst GPU workloads. Baseline GPU nodes are managed
# by the gpu-baseline Managed Node Group (ASG, always-on) and are NOT
# managed by Karpenter.
#
# Priority:
#   1. gpu-burst-spot  (weight=10) — Spot instances, 60-70% cost savings
#   2. gpu-burst-od    (weight=1)  — On-Demand fallback when Spot unavailable
#
# Requirements:
#   - Karpenter v1 API (karpenter.sh/v1)
#   - EC2NodeClass "gpu-class" must be created first
################################################################################
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-burst-spot
spec:
  weight: 10
  template:
    metadata:
      labels:
        node-type: gpu
        gpu-tier: burst
        capacity-type: spot
        karpenter.sh/nodepool: gpu-burst-spot
    spec:
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - g7e.48xlarge
            - g7e.24xlarge
            - g7e.12xlarge
            - g6e.48xlarge
            - g6e.24xlarge
            - g6e.12xlarge
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - spot
        - key: topology.kubernetes.io/zone
          operator: In
          values:
            - AVAILABILITY_ZONE
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: gpu-class

  limits:
    cpu: "1920"
    nvidia.com/gpu: "80"

  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 10m

---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-burst-od
spec:
  weight: 1
  template:
    metadata:
      labels:
        node-type: gpu
        gpu-tier: burst
        capacity-type: on-demand
        karpenter.sh/nodepool: gpu-burst-od
    spec:
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - g7e.48xlarge
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
        - key: topology.kubernetes.io/zone
          operator: In
          values:
            - AVAILABILITY_ZONE
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: gpu-class

  limits:
    cpu: "960"
    nvidia.com/gpu: "40"

  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 10m
