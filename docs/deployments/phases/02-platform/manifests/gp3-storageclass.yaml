################################################################################
# gp3 StorageClass
#
# Default StorageClass for EBS volumes. Provides baseline 3,000 IOPS and
# 125 MB/s throughput. Used by ClickHouse, Prometheus, and other stateful
# workloads deployed in later phases.
################################################################################
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
  fsType: ext4
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
