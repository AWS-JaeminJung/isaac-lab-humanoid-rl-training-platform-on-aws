################################################################################
# ClusterSecretStore for External Secrets Operator
#
# Points to AWS Secrets Manager as the backend secret provider.
# All ExternalSecret resources in any namespace can reference this store.
#
# Requirements:
#   - External Secrets Operator must be installed
#   - Replace AWS_REGION with the actual region
#   - The external-secrets service account must have the IRSA role attached
################################################################################
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: isaac-lab
spec:
  provider:
    aws:
      service: SecretsManager
      region: AWS_REGION
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
