################################################################################
# Keycloak Ingress - Internal ALB with ACM TLS
#
# Requires:
#   - AWS Load Balancer Controller installed (Phase 02)
#   - ACM certificate for *.isaac-lab.internal (Phase 01)
#   - Environment variable ACM_CERT_ARN set before applying via envsubst
#
# Usage:
#   export ACM_CERT_ARN="arn:aws:acm:us-east-1:123456789012:certificate/..."
#   envsubst < keycloak-ingress.yaml | kubectl apply -f -
################################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: "${ACM_CERT_ARN}"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /health/ready
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
  labels:
    app.kubernetes.io/part-of: isaac-lab
    app.kubernetes.io/component: authentication
spec:
  rules:
    - host: keycloak.isaac-lab.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
