################################################################################
# ClickHouse StatefulSet
#
# Runs the ClickHouse server for training metrics and log storage with:
#   - Persistent 50Gi gp3 volume for data
#   - HTTP API (8123) and native protocol (9000) ports
#   - Management node placement
#
# Usage:
#   kubectl apply -f clickhouse-statefulset.yaml
################################################################################
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: logging
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: isaac-lab
    app.kubernetes.io/component: recorder
    app.kubernetes.io/managed-by: kubectl
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/part-of: isaac-lab
        app.kubernetes.io/component: recorder
    spec:
      nodeSelector:
        node-type: management
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
            - name: native
              containerPort: 9000
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: gp3
        resources:
          requests:
            storage: 50Gi
