################################################################################
# Fluent Bit DaemonSet
#
# Deploys Fluent Bit on every node in the cluster to collect training pod
# logs and forward them to ClickHouse:
#   - Tolerates all taints (runs on GPU and management nodes)
#   - IRSA-annotated ServiceAccount for AWS access
#   - Mounts /var/log from host for container log access
#   - Configuration loaded from fluent-bit-config ConfigMap
################################################################################
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: isaac-lab
    app.kubernetes.io/component: recorder
    app.kubernetes.io/managed-by: kubectl
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
        app.kubernetes.io/name: fluent-bit
        app.kubernetes.io/part-of: isaac-lab
        app.kubernetes.io/component: recorder
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        - operator: Exists
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.1
          ports:
            - name: http-metrics
              containerPort: 2020
              protocol: TCP
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 2020
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 2020
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: config
          configMap:
            name: fluent-bit-config
